name: Dependency Review

on:
  pull_request:
    branches: ["main"]

permissions:
  contents: read
  pull-requests: write

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/dependency-review-action@ce3cf9537a52e8119d91fd484ab5957e17f0965c # v4.4.0
        with:
          fail-on-severity: high
          comment-summary-in-pr: always
